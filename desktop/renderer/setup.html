<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activar POSMoon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="setup-body">
    <div class="setup-card">
        <h1>POSMoon — Activación</h1>
        <p class="muted">Vincule esta caja con su servidor Moon. Necesita internet solo para activar y renovar la licencia.</p>

        <form id="form">
            <label>Servidor Moon (URL)
                <input type="url" name="server_url" required placeholder="https://cmoon.aiporvos.com">
            </label>
            <label>Usuario POS
                <input type="text" name="usuario" required autocomplete="username" placeholder="admin">
            </label>
            <label>Contraseña
                <input type="password" name="password" required autocomplete="current-password">
            </label>
            <label>ID cliente Moon (cobros)
                <input type="number" name="moon_client_id" required min="1" placeholder="14">
            </label>
            <label>Nombre de esta caja
                <input type="text" name="device_name" value="Caja 1">
            </label>
            <p id="error" class="error" hidden></p>
            <button type="submit" id="btn">Activar y entrar al POS</button>
        </form>
    </div>
    <script>
        const form = document.getElementById('form');
        const error = document.getElementById('error');
        const btn = document.getElementById('btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            error.hidden = true;
            btn.disabled = true;
            btn.textContent = 'Activando…';

            const fd = new FormData(form);
            try {
                await window.cmoon.activate(Object.fromEntries(fd));
                await window.cmoon.openPos();
            } catch (err) {
                error.textContent = err.message || 'Error de activación';
                error.hidden = false;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Activar y entrar al POS';
            }
        });
    </script>
</body>
</html>
