<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cobranza · CMoon</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="topbar"><div><button type="button" id="btn-home" class="btn-link">← Inicio</button><strong>Cobranza</strong></div><div class="status-row"><span id="online" class="pill off">—</span><button type="button" id="btn-sync" class="btn-sm">Sync</button></div></header>
<main class="panel page-panel">
    <label class="field-label">Cliente</label>
    <select id="cliente" class="client-select"></select>
    <p id="saldo" class="saldo-line"></p>
    <label class="field-label">Importe cobrado</label>
    <input type="number" id="importe" step="0.01" min="0.01" class="search">
    <label class="field-label">Concepto</label>
    <input type="text" id="concepto" value="Cobranza en ruta" class="search">
    <button type="button" id="btn-guardar" class="btn-primary btn-pedido" style="margin-top:1rem;width:100%">Registrar cobro</button>
</main>
<script src="js/license.js"></script><script src="js/bridge.js"></script><script src="js/common.js"></script><script src="js/cobranza.js"></script>
</body></html>
