<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Pedido · POSMoon</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="topbar">
        <div>
            <button type="button" id="btn-home" class="btn-link">← Inicio</button>
            <strong id="empresa">POSMoon</strong>
        </div>
        <div class="status-row">
            <span id="online" class="pill off">Sin conexión</span>
            <span id="pending" class="pill warn" hidden></span>
            <button type="button" id="btn-sync" class="btn-sm">Sync</button>
        </div>
    </header>

    <div id="scan-overlay" class="scan-overlay" hidden>
        <p>Apunte la cámara al código de barras</p>
        <button type="button" id="btn-overlay-stop" class="btn-sm">Terminar escaneo</button>
    </div>

    <main id="pedido" class="pos-layout">
        <section class="panel search-panel">
            <label class="field-label">Cliente *</label>
            <input type="text" id="buscar-cliente" class="search" inputmode="search" autocomplete="off"
                   placeholder="Buscar cliente…">
            <select id="cliente" class="client-select" size="4"></select>

            <div class="scan-actions" style="margin-top:.75rem">
                <button type="button" id="btn-escanear" class="btn-scan">📷 Escanear</button>
                <button type="button" id="btn-escanear-uno" class="btn-secondary">1 código</button>
            </div>
            <input type="text" id="buscar" class="search" inputmode="search" autocomplete="off"
                   placeholder="Código o buscar producto…">
            <div id="sugerencias" class="suggestions"></div>
            <div id="scan-toast" class="scan-toast" hidden></div>
        </section>

        <section class="panel cart-panel">
            <h2>Pedido <span id="cart-count" class="badge">0</span></h2>
            <div id="carrito" class="cart-items"></div>
            <label class="field-label">Observaciones</label>
            <textarea id="observaciones" rows="2" class="obs-input" placeholder="Notas para administración…"></textarea>
            <div class="totals">
                <div class="total-line"><span>Total estimado</span><strong id="total">$ 0,00</strong></div>
            </div>
            <div class="actions">
                <button type="button" id="btn-vaciar" class="btn-secondary">Vaciar</button>
                <button type="button" id="btn-enviar" class="btn-primary btn-pedido" disabled>Enviar pedido</button>
            </div>
            <p class="hint">El pedido quedará pendiente de aprobación en el panel.</p>
        </section>
    </main>

    <dialog id="modal-ok">
        <h3 id="ok-title">Pedido enviado</h3>
        <p id="ok-msg"></p>
        <button type="button" id="ok-close">Continuar</button>
    </dialog>

    <script src="js/license.js"></script>
    <script src="js/bridge.js"></script>
    <script src="js/scanner.js"></script>
    <script src="js/pedido.js"></script>
</body>
</html>
