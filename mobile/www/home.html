<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>CMoon</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="setup-body">
    <div class="setup-card home-card">
        <h1 id="empresa">CMoon</h1>
        <p class="muted">Hola, <strong id="usuario">—</strong></p>
        <p id="sync-msg" class="hint" hidden></p>

        <div class="home-actions">
            <a href="pos.html" id="btn-pos" class="home-btn home-btn-pos" hidden>
                <span class="home-btn-title">Punto de venta</span>
                <span class="home-btn-desc">Cobrar y registrar ventas</span>
            </a>
            <a href="pedido.html" id="btn-pedido" class="home-btn home-btn-pedido" hidden>
                <span class="home-btn-title">Tomar pedido</span>
                <span class="home-btn-desc">Preventista · envía a presupuesto</span>
            </a>
        </div>

        <div class="home-footer">
            <span id="online" class="pill off">Sin conexión</span>
            <span id="pending" class="pill warn" hidden></span>
            <button type="button" id="btn-sync" class="btn-sm">Sync</button>
            <button type="button" id="btn-setup" class="btn-secondary btn-setup-link">Configuración</button>
        </div>
    </div>

    <script src="js/license.js"></script>
    <script src="js/bridge.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
