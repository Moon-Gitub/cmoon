<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>POSMoon</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="setup-body">
    <div class="setup-card home-card">
        <h1 id="empresa">POSMoon</h1>
        <p class="muted">Hola, <strong id="usuario">—</strong></p>
        <div class="home-actions">
            <a href="pos.html" id="btn-pos" class="home-btn home-btn-pos" hidden><span class="home-btn-title">Punto de venta</span><span class="home-btn-desc">Cobrar ventas</span></a>
            <a href="pedido.html" id="btn-pedido" class="home-btn home-btn-pedido" hidden><span class="home-btn-title">Tomar pedido</span><span class="home-btn-desc">Preventista</span></a>
            <a href="clientes.html" id="btn-clientes" class="home-btn" hidden><span class="home-btn-title">Mis clientes</span><span class="home-btn-desc">Cartera y saldos</span></a>
            <a href="cobranza.html" id="btn-cobranza" class="home-btn home-btn-cobranza" hidden><span class="home-btn-title">Cobranza</span><span class="home-btn-desc">Cuenta corriente</span></a>
            <a href="rutas.html" id="btn-rutas" class="home-btn" hidden><span class="home-btn-title">Mi ruta</span><span class="home-btn-desc">Visitas del día</span></a>
            <a href="entregas.html" id="btn-entregas" class="home-btn" hidden><span class="home-btn-title">Entregas</span><span class="home-btn-desc">Firma y fotos</span></a>
            <a href="reportes.html" id="btn-reportes" class="home-btn" hidden><span class="home-btn-title">Mi resumen</span><span class="home-btn-desc">Pedidos, ventas, cobros</span></a>
        </div>
        <div class="home-footer">
            <span id="online" class="pill off">Sin conexión</span>
            <span id="pending" class="pill warn" hidden></span>
            <button type="button" id="btn-sync" class="btn-sm">Sync</button>
            <button type="button" id="btn-setup" class="btn-secondary btn-setup-link">Configuración</button>
        </div>
    </div>
    <script src="js/license.js"></script>
    <script src="js/bridge.js"></script>
    <script src="js/common.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
